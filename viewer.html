<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Explorer - InsideKidney</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="medical-theme page-viewer">

  <!-- Top Navigation & Search -->
  <header class="top-nav">
    <div class="brand">
      <span class="icon">🫘</span>
      <h1>InsideKidney</h1>
    </div>
    <!-- Hamburger (mobile only) -->
    <button class="hamburger" id="btn-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-links" id="main-nav">
      <a href="index.html">Home</a>
      <a href="viewer.html" class="active">3D Explorer</a>
      <a href="quiz.html">Quiz</a>
    </nav>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search anatomy..." />
    </div>
    <div class="nav-controls">
      <button id="btn-fullscreen" title="Fullscreen">⛶</button>
      <button id="btn-settings" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- Main Application Area -->
  <main class="app-core">
    <!-- Mobile overlay backdrop -->
    <div class="mobile-overlay" id="mobile-overlay"></div>
    
    <!-- Left Sidebar: Categories & Lists -->
    <aside class="sidebar left-sidebar" id="sidebar">
      <nav class="sidebar-tabs">
        <button class="tab-btn active" data-target="anatomy">Anatomy</button>
        <button class="tab-btn" data-target="function">Function</button>
      </nav>
      
      <div class="sidebar-content" id="anatomy-list">
        <!-- Populated dynamically via JS -->
      </div>
    </aside>

    <!-- 3D Canvas Area -->
    <section class="viewer-container" id="viewer-container">
      
      <!-- Camera Floating Overlay -->
      <div id="camera-overlay" class="camera-info glass-panel">
        <div>X: <span id="cam-x">0.00</span></div>
        <div>Y: <span id="cam-y">0.00</span></div>
        <div>Z: <span id="cam-z">0.00</span></div>
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay">
        <div class="medical-spinner"></div>
        <div class="progress-wrap"><div id="progress-bar"></div></div>
        <div id="loading-text">Initializing Medical Interface...</div>
      </div>
      
      <!-- Info Popup (Glassmorphism) -->
      <div id="info-popup" class="hidden">
        <button class="close-btn" id="btn-close-info">×</button>

        <!-- Image Preview -->
        <div class="popup-preview-wrap">
          <img id="preview-img" src="" alt="Preview" />
          <div class="preview-spinner" id="preview-spinner"></div>
        </div>

        <!-- Info Body -->
        <div class="popup-body">
          <div class="popup-header">
            <div>
              <h2 id="info-title">Title</h2>
              <div id="info-subtitle" class="subtitle">Subtitle</div>
            </div>
          </div>
          <p id="info-desc" class="desc">Description...</p>
          <ul id="info-facts" class="facts-list"></ul>
        </div>
      </div>
    </section>

    <!-- Right Sidebar: Visualization Controls -->
    <aside class="sidebar right-sidebar" id="right-sidebar">
      <h3>Visualization Controls</h3>
      <div class="control-group">
        <label><input type="checkbox" id="toggle-blood" checked /> Show Artery &amp; Vein</label>
        <label><input type="checkbox" id="toggle-urine" checked /> Show Urinary Collecting System</label>
        <label><input type="checkbox" id="toggle-labels" checked /> Show Labels</label>
      </div>
      
      <h3>Filter Objects</h3>
      <div class="control-group" id="filter-objects-list">
        <!-- Dynamically populated by JS based on loaded models -->
      </div>

      <h3>Label Manager</h3>
      <div class="control-group" id="label-manager-container">

        <!-- Edit Mode Toggle -->
        <div class="edit-mode-row">
          <label class="toggle-switch" for="toggle-edit-labels" title="Enable to drag labels in the 3D viewport">
            <input type="checkbox" id="toggle-edit-labels" />
            <span class="toggle-track"></span>
            <span class="toggle-label-text">Edit Mode (Drag Labels)</span>
          </label>
        </div>

        <select id="label-select" class="modern-input">
          <option value="">-- Select Label to Edit --</option>
        </select>
        <input type="text" id="label-name" placeholder="Label Name" class="modern-input" disabled />
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="checkbox" id="label-visible" disabled /> <label for="label-visible" style="font-size: 0.85rem; margin:0;">Is Visible</label>
        </div>
        <div style="display: flex; gap: 8px;">
          <input type="number" id="label-x" placeholder="X" step="0.1" class="modern-input" disabled />
          <input type="number" id="label-y" placeholder="Y" step="0.1" class="modern-input" disabled />
          <input type="number" id="label-z" placeholder="Z" step="0.1" class="modern-input" disabled />
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="btn-add-label" class="outline-btn">Add New</button>
          <button id="btn-delete-label" class="outline-btn" style="color:#f87171; border-color:#f87171;" disabled>Delete</button>
        </div>
        <button id="btn-save-conf" class="btn btn-primary" style="margin-top: 10px; width: 100%;">💾 Save to conf.json</button>
      </div>

      <div class="control-group" style="margin-top: 20px;">
        <button id="btn-reset-cam" class="outline-btn">Reset Camera</button>
        <button id="btn-screenshot" class="outline-btn">Capture Screenshot</button>
      </div>
    </aside>

  </main>

  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <!-- Application Entry Point -->
  <script type="module" src="main.js"></script>
</body>
</html>
