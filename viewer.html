<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Explorer - InsideKidney</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="medical-theme page-viewer">

  <!-- Top Navigation & Search -->
  <header class="top-nav">
    <div class="brand">
      <span class="icon">🫘</span>
      <h1>InsideKidney</h1>
    </div>
    <!-- Hamburger (mobile only) -->
    <button class="hamburger" id="btn-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-links" id="main-nav">
      <a href="index.html" data-i18n="nav_home">Home</a>
      <a href="viewer.html" class="active" data-i18n="nav_explorer">3D Explorer</a>
      <a href="quiz.html" data-i18n="nav_quiz">Quiz</a>
    </nav>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" data-i18n-ph="search_ph" placeholder="Search anatomy..." />
    </div>
    <!-- Language Toggle -->
    <div class="lang-toggle" id="lang-toggle" title="Switch language / เปลี่ยนภาษา">
      <span class="lang-flag lang-en">🇬🇧</span>
      <label class="toggle-switch lang-switch" for="lang-checkbox">
        <input type="checkbox" id="lang-checkbox" />
        <span class="toggle-track"></span>
      </label>
      <span class="lang-flag lang-th">🇹🇭</span>
    </div>
    <div class="nav-controls">
      <button id="btn-header-reset-cam" title="Reset Camera">🔄</button>
      <button id="btn-settings" title="Settings">⚙️</button>
    </div>
  </header>

  <!-- Main Application Area -->
  <main class="app-core">
    <!-- Mobile overlay backdrop -->
    <div class="mobile-overlay" id="mobile-overlay"></div>
    
    <!-- Left Sidebar: Categories & Lists -->
    <aside class="sidebar left-sidebar" id="sidebar">
      <nav class="sidebar-tabs">
        <button class="tab-btn active" data-target="anatomy" data-i18n="sidebar_anatomy">Anatomy</button>
      </nav>
      
      <div class="sidebar-content" id="anatomy-list">
        <!-- Populated dynamically via JS -->
      </div>
    </aside>

    <!-- 3D Canvas Area -->
    <section class="viewer-container" id="viewer-container">
      
      <!-- Camera Floating Overlay -->
      <div id="camera-overlay" class="camera-info glass-panel">
        <div>X: <span id="cam-x">0.00</span></div>
        <div>Y: <span id="cam-y">0.00</span></div>
        <div>Z: <span id="cam-z">0.00</span></div>
      </div>

      <!-- Loading Overlay -->
      <div id="loading-overlay">
        <div class="medical-spinner"></div>
        <div class="progress-wrap"><div id="progress-bar"></div></div>
        <div id="loading-text" data-i18n="loading_text">Initializing Medical Interface...</div>
      </div>
      
      <!-- Info Popup (Glassmorphism) -->
      <div id="info-popup" class="hidden">
        <button class="close-btn" id="btn-close-info">×</button>

        <!-- Image Preview -->
        <div class="popup-preview-wrap">
          <img id="preview-img" src="" alt="Preview" />
          <div class="preview-spinner" id="preview-spinner"></div>
        </div>

        <!-- Info Body -->
        <div class="popup-body">
          <div class="popup-header">
            <div>
              <h2 id="info-title">Title</h2>
              <div id="info-subtitle" class="subtitle">Subtitle</div>
            </div>
          </div>
          <p id="info-desc" class="desc">Description...</p>
          <ul id="info-facts" class="facts-list"></ul>
        </div>
      </div>
    </section>

    <!-- Right Sidebar: Visualization Controls -->
    <aside class="sidebar right-sidebar" id="right-sidebar">
      <h3 data-i18n="ctrl_title">Visualization Controls</h3>
      <div class="control-group">
        <label><input type="checkbox" id="toggle-blood" checked /> <span data-i18n="ctrl_blood">Show Artery &amp; Vein</span></label>
        <label><input type="checkbox" id="toggle-urine" checked /> <span data-i18n="ctrl_urine">Show Urinary Collecting System</span></label>
        <label><input type="checkbox" id="toggle-labels" checked /> <span data-i18n="ctrl_labels">Show Labels</span></label>
      </div>
      
      <h3 data-i18n="filter_title">Filter Objects</h3>
      <div class="control-group" id="filter-objects-list">
        <!-- Dynamically populated by JS based on loaded models -->
      </div>

      <h3 data-i18n="model_pos_title">Model Positions</h3>
      <div class="control-group" id="model-position-editor">
        <select id="model-select" class="modern-input">
          <option value="" data-i18n="model_select_ph">-- Select Model --</option>
        </select>
        <div style="display:flex; gap:6px; margin-top:8px;">
          <div style="flex:1;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:2px;">X</div>
            <input type="number" id="model-pos-x" step="0.1" class="modern-input" disabled />
          </div>
          <div style="flex:1;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:2px;">Y</div>
            <input type="number" id="model-pos-y" step="0.1" class="modern-input" disabled />
          </div>
          <div style="flex:1;">
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:2px;">Z</div>
            <input type="number" id="model-pos-z" step="0.1" class="modern-input" disabled />
          </div>
        </div>
        <div style="display:flex; gap:6px; margin-top:8px;">
          <button id="btn-reset-model-pos" class="outline-btn" disabled style="flex:1;" data-i18n="btn_reset">Reset</button>
          <button id="btn-log-model-pos" class="outline-btn" style="flex:1;" data-i18n="btn_log_all">Log All</button>
        </div>
      </div>

      <h3 data-i18n="label_mgr_title">Label Manager</h3>
      <div class="control-group" id="label-manager-container">

        <!-- Edit Mode Toggle -->
        <div class="edit-mode-row">
          <label class="toggle-switch" for="toggle-edit-labels" title="Enable to drag labels in the 3D viewport">
            <input type="checkbox" id="toggle-edit-labels" />
            <span class="toggle-track"></span>
            <span class="toggle-label-text" data-i18n="edit_mode_text">Edit Mode (Drag Labels)</span>
          </label>
        </div>

        <select id="label-select" class="modern-input">
          <option value="" data-i18n="label_select_ph">-- Select Label to Edit --</option>
        </select>
        <input type="text" id="label-name" data-i18n-ph="label_name_ph" placeholder="Label Name" class="modern-input" disabled />
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="checkbox" id="label-visible" disabled /> <label for="label-visible" style="font-size: 0.85rem; margin:0;" data-i18n="label_visible">Is Visible</label>
        </div>
        <div style="display: flex; gap: 8px;">
          <input type="number" id="label-x" placeholder="X" step="0.1" class="modern-input" disabled />
          <input type="number" id="label-y" placeholder="Y" step="0.1" class="modern-input" disabled />
          <input type="number" id="label-z" placeholder="Z" step="0.1" class="modern-input" disabled />
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="btn-add-label" class="outline-btn" data-i18n="btn_add_new">Add New</button>
          <button id="btn-delete-label" class="outline-btn" style="color:#f87171; border-color:#f87171;" disabled data-i18n="btn_delete">Delete</button>
        </div>
        <button id="btn-save-conf" class="btn btn-primary" style="margin-top: 10px; width: 100%;" data-i18n="btn_save_conf">💾 Save to conf.json</button>
      </div>

      <div class="control-group" style="margin-top: 20px;">
        <button id="btn-reset-cam" class="outline-btn" data-i18n="btn_reset_cam">Reset Camera</button>
        <button id="btn-screenshot" class="outline-btn" data-i18n="btn_screenshot">Capture Screenshot</button>
      </div>
    </aside>

  </main>

  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <!-- Language Bootstrap (before main.js) -->
  <script type="module">
    import { getCurrentLang, setCurrentLang, applyTranslations } from './src/lang/translations.js';

    const checkbox = document.getElementById('lang-checkbox');
    const lang = getCurrentLang();
    checkbox.checked = (lang === 'th');
    applyTranslations(lang);

    checkbox.addEventListener('change', () => {
      const newLang = checkbox.checked ? 'th' : 'en';
      setCurrentLang(newLang);
      applyTranslations(newLang);
      document.documentElement.lang = newLang === 'th' ? 'th' : 'en';
    });
  </script>

  <!-- Application Entry Point -->
  <script type="module" src="main.js"></script>
</body>
</html>
